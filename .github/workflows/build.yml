name: Build HypeClip AI (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows x64 plugin
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the OBS libraries from the SAME version you run (32.1.2). This also
      # downloads the exact Qt6 that OBS 32 ships, which we build the plugin against.
      - name: Build OBS 32.1.2 libraries
        shell: pwsh
        run: |
          git clone --recursive --depth 1 --branch 32.1.2 https://github.com/obsproject/obs-studio.git obs-src
          cd obs-src
          cmake --preset windows-x64
          cmake --build build_x64 --config RelWithDebInfo --target libobs obs-frontend-api

      - name: Locate OBS + Qt outputs
        id: obs
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}/obs-src"
          $libobs   = (Get-ChildItem "$root/build_x64" -Recurse -Filter obs.lib | Where-Object FullName -match 'libobs' | Select-Object -First 1).FullName
          $frontend = (Get-ChildItem "$root/build_x64" -Recurse -Filter obs-frontend-api.lib | Select-Object -First 1).FullName
          $cfgdir   = Split-Path (Get-ChildItem "$root/build_x64" -Recurse -Filter obsconfig.h | Select-Object -First 1).FullName
          $qtcfg    = (Get-ChildItem "$root/.deps" -Recurse -Filter Qt6Config.cmake | Where-Object FullName -match 'x64' | Select-Object -First 1).FullName
          if (-not $qtcfg)   { throw "Qt6 not found in OBS deps" }
          if (-not $libobs -or -not $frontend -or -not $cfgdir) { throw "OBS outputs not found" }
          $qtdir    = Split-Path $qtcfg
          $qtprefix = (Resolve-Path "$qtdir/../../..").Path
          "libobs=$libobs"     | Out-File $env:GITHUB_OUTPUT -Append
          "frontend=$frontend" | Out-File $env:GITHUB_OUTPUT -Append
          "cfgdir=$cfgdir"     | Out-File $env:GITHUB_OUTPUT -Append
          "qtdir=$qtdir"       | Out-File $env:GITHUB_OUTPUT -Append
          "qtprefix=$qtprefix" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Qt6_DIR = $qtdir"

      - name: Configure HypeClip AI
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DQt6_DIR="${{ steps.obs.outputs.qtdir }}" `
            -DCMAKE_PREFIX_PATH="${{ steps.obs.outputs.qtprefix }}" `
            -DENABLE_QT=ON -DENABLE_FRONTEND_API=ON `
            -DHYPECLIP_OBS_SRC="${{ github.workspace }}/obs-src" `
            -DOBS_LIBOBS_LIB="${{ steps.obs.outputs.libobs }}" `
            -DOBS_FRONTEND_LIB="${{ steps.obs.outputs.frontend }}" `
            -DOBS_CONFIG_INCLUDE="${{ steps.obs.outputs.cfgdir }}"

      - name: Build HypeClip AI
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo

      - name: Assemble package
        shell: pwsh
        run: |
          $out = "HypeClipAI-Windows"
          New-Item -ItemType Directory -Force -Path "$out" | Out-Null
          $dll = Get-ChildItem -Path build -Recurse -Filter hypeclip-ai.dll | Select-Object -First 1
          if (-not $dll) { throw "hypeclip-ai.dll was not produced" }
          Copy-Item $dll.FullName "$out\hypeclip-ai.dll"
          Copy-Item -Recurse -Force data "$out\data"
          if (Test-Path "Install-HypeClip-AI.bat") { Copy-Item "Install-HypeClip-AI.bat" "$out\" }
          if (Test-Path "INSTALL-README.txt")       { Copy-Item "INSTALL-README.txt" "$out\" }

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: HypeClipAI-Windows
          path: HypeClipAI-Windows
